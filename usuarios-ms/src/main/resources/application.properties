spring.application.name=Tons Usuarios MS

# Configuracao do H2 Database

# Configuracao para usar o H2 em modo de memoria
spring.datasource.url=jdbc:h2:mem:tonsdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Configuracao do JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Habilita o console do H2 para acesso via navegador no http://localhost:8080/h2-console
spring.h2.console.enabled=true
